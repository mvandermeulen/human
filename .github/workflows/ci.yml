name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go tool staticcheck ./...
      - run: go tool golangci-lint run ./...

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: sudo apt-get install -y fuse3
      - run: go tool gotestsum -- -coverprofile=coverage.out $(go list ./... | grep -v /cmd/)
      - name: Check coverage threshold
        run: >-
          go tool cover -func=coverage.out |
          awk '/^total:/{gsub(/%/,"",$NF); printf "Total coverage: %s%%\n", $NF;
          if ($NF+0 < 80.0) {print "::error::Coverage below 80% threshold"; exit 1}
          else {print "OK: meets 80% threshold"}}'
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go tool gosec ./...
      - run: ./scripts/govulncheck.sh
      - run: go tool gitleaks git -v

  build:
    runs-on: ubuntu-24.04
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go build -o bin/human .
