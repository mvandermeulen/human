version: 2

# Release binaries embed the GUI frontend; build it before the Go builds
# so go:embed picks up the Vite output in internal/gui/dist.
before:
  hooks:
    - make web

builds:
  - main: .
    binary: human
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: human
    binaries:
      - human
    repository:
      owner: gethuman-sh
      name: homebrew-tap
    homepage: https://github.com/gethuman-sh/human
    description: Issue tracker CLI for AIs
    # The released binaries are unsigned, so strip the quarantine attribute on
    # install or macOS Gatekeeper blocks the CLI on first run.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/human"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
